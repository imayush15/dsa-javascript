<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript DSA Practice Journal Banner</title>
  <desc id="desc">A minimal banner with gradients, code-inspired shapes, and the title of the repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#121A33"/>
      <stop offset="1" stop-color="#0A0F1E"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="52" x2="1040" y2="308" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="188" cy="78" r="56" fill="#7DD3FC" opacity="0.15" filter="url(#blur)"/>
  <circle cx="1040" cy="276" r="92" fill="#A78BFA" opacity="0.14" filter="url(#blur)"/>
  <circle cx="858" cy="82" r="54" fill="#FBBF24" opacity="0.10" filter="url(#blur)"/>

  <path d="M112 246C214 154 324 128 444 144C550 158 618 214 722 214C836 214 904 136 1016 96" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M112 268H1088" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <g opacity="0.95">
    <rect x="102" y="94" width="18" height="18" rx="4" fill="#7DD3FC"/>
    <rect x="128" y="94" width="18" height="18" rx="4" fill="#A78BFA"/>
    <rect x="154" y="94" width="18" height="18" rx="4" fill="#FBBF24"/>
  </g>

  <text x="102" y="164" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="54" font-weight="700" letter-spacing="-0.02em">JavaScript DSA Practice Journal</text>
  <text x="102" y="208" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="400">
    A record of problems solved, patterns learned, and ideas refined.
  </text>

  <g transform="translate(810 92)">
    <rect x="0" y="0" width="300" height="150" rx="20" fill="#0F172A" stroke="white" stroke-opacity="0.08"/>
    <text x="26" y="36" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">// practice loop</text>
    <text x="26" y="72" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20">problem()</text>
    <text x="26" y="102" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20">  .attempt()</text>
    <text x="26" y="132" fill="#A78BFA" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20">  .refine();</text>
  </g>
</svg>
